<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Tebak 100 Bendera Dunia</title>
    <!-- Import Library Flag Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .game-card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 450px; }
        
        /* Container untuk Bendera CSS */
        .flag-container { font-size: 120px; margin-bottom: 1.5rem; display: block; }
        .fi { border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .hint-box { min-height: 70px; margin-bottom: 1.5rem; background: #fff9e6; padding: 15px; border-radius: 12px; border-left: 5px solid #f39c12; }
        .hint-text { color: #555; font-size: 0.95rem; font-style: italic; line-height: 1.5; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { padding: 15px; font-size: 1rem; cursor: pointer; border: 2px solid #3498db; border-radius: 12px; background: white; color: #3498db; font-weight: bold; transition: 0.2s; }
        button:hover:not(:disabled) { background: #3498db; color: white; }
        button:disabled { cursor: default; }
        #feedback { margin: 15px 0; font-weight: bold; font-size: 1.1rem; height: 1.5em; }
        #next-btn { display: none; width: 100%; padding: 15px; background: #2ecc71; border: none; color: white; border-radius: 12px; font-size: 1.1rem; cursor: pointer; }
        .progress { font-size: 0.8rem; color: #999; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="game-card">
    <div class="progress">PROGRES: <span id="current-q">1</span> / 100</div>
    
    <!-- Area Bendera menggunakan SPAN class fi -->
    <div class="flag-container">
        <span id="flag-icon" class="fi"></span>
    </div>

    <div class="hint-box">
        <div class="hint-text" id="hint-text"></div>
    </div>

    <div class="options">
        <button onclick="checkAnswer(this)" id="opt0"></button>
        <button onclick="checkAnswer(this)" id="opt1"></button>
    </div>

    <div id="feedback"></div>
    <button id="next-btn" onclick="nextQuestion()">Lanjut &raquo;</button>
    <div style="margin-top:20px; font-weight: bold;">Skor: <span id="score">0</span></div>
</div>

        { name: "Mali", code: "ml", hint: "Negara gurun tempat berdirinya kota kuno Timbuktu." },
        { name: "Lebanon", code: "lb", hint: "Terkenal dengan pohon Cedar yang ada di benderanya." },
        { name: "Azerbaijan", code: "az", hint: "Dijuluki sebagai Negeri Api karena sumber gas alamnya." },
        { name: "Georgia", code: "ge", hint: "Negara di pegunungan Kaukasus, tempat asal minuman anggur tertua." },
        { name: "Armenia", code: "am", hint: "Negara pertama di dunia yang mengadopsi Kristen sebagai agama resmi." },
        { name: "Malta", code: "mt", hint: "Negara kepulauan kecil di tengah Laut Mediterania." },
        { name: "Siprus", code: "cy", hint: "Pulau yang benderanya memiliki gambar peta negaranya sendiri." },
        { name: "Fiji", code: "fj", hint: "Negara kepulauan di Pasifik, surga bagi penyelam." }

        // Tambahkan sisa negara hingga 100 di sini dengan pola yang sama
    ];

    let currentIdx = 0;
    let score = 0;
    let gameData = [];

    function init() {
        gameData = [...countries].sort(() => Math.random() - 0.5);
        render();
    }

    function render() {
        const item = gameData[currentIdx];
        const flagEl = document.getElementById('flag-icon');
        
        // Reset class dan tambahkan yang baru
        flagEl.className = `fi fi-${item.code}`;
        
        document.getElementById('current-q').innerText = currentIdx + 1;
        document.getElementById('hint-text').innerText = `"${item.hint}"`;
        document.getElementById('feedback').innerText = "";
        document.getElementById('next-btn').style.display = "none";

        // Ambil opsi salah secara acak
        let wrong;
        do { wrong = countries[Math.floor(Math.random() * countries.length)]; } 
        while (wrong.name === item.name);

        const opts = [item.name, wrong.name].sort(() => Math.random() - 0.5);
        document.getElementById('opt0').innerText = opts[0];
        document.getElementById('opt1').innerText = opts[1];
        
        document.querySelectorAll('.options button').forEach(b => {
            b.disabled = false;
            b.style.background = "white";
            b.style.color = "#3498db";
            b.style.borderColor = "#3498db";
        });
    }

    function checkAnswer(btn) {
        const correct = gameData[currentIdx].name;
        const feedback = document.getElementById('feedback');
        document.querySelectorAll('.options button').forEach(b => b.disabled = true);
        
        if (btn.innerText === correct) {
            score++;
            btn.style.background = "#2ecc71";
            btn.style.color = "white";
            btn.style.borderColor = "#2ecc71";
            feedback.innerText = "Benar! ✨";
            feedback.style.color = "#2ecc71";
        } else {
            btn.style.background = "#e74c3c";
            btn.style.color = "white";
            btn.style.borderColor = "#e74c3c";
            feedback.innerText = `Salah! Itu adalah ${correct}.`;
            feedback.style.color = "#e74c3c";
        }
        
        document.getElementById('score').innerText = score;
        document.getElementById('next-btn').style.display = "block";
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < gameData.length) {
            render();
        } else {
            alert(`Permainan Selesai! Skor akhir: ${score}/${gameData.length}`);
            location.reload();
        }
    }

    init();
</script>
